name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake python3 python3-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libxext-dev \
            yosys \
            build-essential

      - name: Configure CMake
        run: cmake -B build -DBUILD_PYTHON_MODULE=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build Python module
        run: cmake --build build --config Release -j$(nproc)

      - name: Verify module is present
        run: ls *.so 2>/dev/null || ls *.pyd 2>/dev/null || (echo "ERROR: open_eda module not found in project root" && exit 1)

      - name: Run all tests
        run: python3 run_all_tests.py
